<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBELA LINS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --terracotta: #c4896a;
      --cream:      #f5efe8;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden; /* hero is full-screen, no scroll needed */
      background: #e8ddd0;
      font-family: 'Montserrat', sans-serif;
    }

    /* ── KEN BURNS ── */
    /* Both scenes share the same animation so they stay in sync
       during the crossfade — the blend looks like one continuous shot. */
    @keyframes kb {
      from { transform: scale(1.00) translate(0%,    0%);    }
      to   { transform: scale(1.07) translate(-0.9%, -0.5%); }
    }

    /* ── SCENES ── */
    .scene {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center top;
      animation: kb 24s ease-in-out infinite alternate;
    }

    #s-empty { z-index: 1; }

    /* Woman scene starts invisible; JS fades it in after a beat */
    #s-woman {
      z-index: 2;
      opacity: 0;
    }

    /* ── OVERLAYS ── */
    .grad-top {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 28%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.28), transparent);
      z-index: 10; pointer-events: none;
    }

    .grad-bot {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 46%;
      background: linear-gradient(to top, rgba(0,0,0,0.55), transparent);
      z-index: 10; pointer-events: none;
    }

    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 88% 78% at 50% 44%,
                    transparent 28%, rgba(0,0,0,0.44) 100%);
      z-index: 11; pointer-events: none;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 28px 48px;
      pointer-events: none;
    }

    .nav__logo {
      height: 36px;
      width: auto;
      opacity: 0;
      filter: brightness(2.5) saturate(0.7);
      transition: opacity 1.6s ease;
    }
    .nav__logo.visible { opacity: 0.85; }

    /* ── BRAND (bottom-left) ── */
    .brand {
      position: fixed;
      bottom: 68px;
      left: 56px;
      z-index: 20;
      pointer-events: none;
    }

    .brand__logo {
      display: block;
      height: clamp(56px, 8vw, 96px);
      width: auto;
      opacity: 0;
      transform: translateY(22px);
      filter: brightness(2.4) saturate(0.75)
              drop-shadow(0 4px 20px rgba(0,0,0,0.4));
      transition:
        opacity   2.2s cubic-bezier(0.16, 1, 0.3, 1),
        transform 2.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .brand__logo.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .brand__sub {
      margin-top: 14px;
      font-size: 0.56rem;
      letter-spacing: 0.65em;
      color: var(--terracotta);
      font-weight: 200;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(14px);
      transition:
        opacity   2.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s,
        transform 2.4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s;
    }
    .brand__sub.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── SCROLL CUE ── */
    .scroll-cue {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    .scroll-cue.visible { opacity: 0.45; }

    .scroll-cue__label {
      font-size: 0.48rem;
      letter-spacing: 0.62em;
      color: var(--cream);
      text-transform: uppercase;
    }

    .scroll-cue__track {
      width: 1px;
      height: 50px;
      background: rgba(255,255,255,0.15);
      position: relative;
      overflow: hidden;
    }
    .scroll-cue__track::after {
      content: '';
      position: absolute;
      top: -100%; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(to bottom, transparent,
                  rgba(255,255,255,0.88), transparent);
      animation: drip 2.6s ease-in-out infinite;
    }
    @keyframes drip {
      0%   { top: -100%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* ── FILM GRAIN ── */
    svg.grain {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 49;
      pointer-events: none;
      mix-blend-mode: overlay;
      animation: grain-shift 0.42s steps(2) infinite;
    }
    @keyframes grain-shift {
      0%   { transform: translate(0px,   0px)  scale(1.01); }
      50%  { transform: translate(-4px, -6px)  scale(1.00); }
      100% { transform: translate( 6px,  3px)  scale(1.02); }
    }
  </style>
</head>
<body>

  <!-- Scene 1: empty room -->
  <div class="scene" id="s-empty"
       style="background-image: url('images/scene-empty.jpg')"></div>

  <!-- Scene 2: woman enters -->
  <div class="scene" id="s-woman"
       style="background-image: url('images/scene-woman.jpg')"></div>

  <div class="grad-top"></div>
  <div class="grad-bot"></div>
  <div class="vignette"></div>

  <nav class="nav">
    <img class="nav__logo" id="navLogo" src="images/logo-mark.png" alt="BBELA LINS">
  </nav>

  <div class="brand" id="brand">
    <img class="brand__logo" id="brandLogo" src="images/logo.png" alt="BBELA LINS">
    <p class="brand__sub" id="brandSub">siga os passos</p>
  </div>

  <div class="scroll-cue" id="scrollCue">
    <span class="scroll-cue__label">scroll</span>
    <div class="scroll-cue__track"></div>
  </div>

  <!-- Film grain -->
  <svg class="grain" xmlns="http://www.w3.org/2000/svg">
    <filter id="gf" x="0%" y="0%" width="100%" height="100%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.76"
                    numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#gf)" opacity="0.05"/>
  </svg>

  <script>
    const woman    = document.getElementById('s-woman');
    const navLogo  = document.getElementById('navLogo');
    const brandLogo = document.getElementById('brandLogo');
    const brandSub  = document.getElementById('brandSub');
    const scrollCue = document.getElementById('scrollCue');

    window.addEventListener('load', () => {

      // 1. Logo and brand appear shortly after load
      setTimeout(() => {
        navLogo.classList.add('visible');
        brandLogo.classList.add('visible');
        brandSub.classList.add('visible');
      }, 400);

      // 2. Woman dissolves in — same Ken Burns offset, seamless blend
      setTimeout(() => {
        woman.style.transition = 'opacity 3.2s ease';
        woman.style.opacity    = '1';
      }, 2000);

      // 3. Scroll cue appears after the reveal is complete
      setTimeout(() => {
        scrollCue.classList.add('visible');
      }, 4500);

    });
  </script>

</body>
</html>
