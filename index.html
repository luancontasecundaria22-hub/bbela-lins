<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBELA LINS</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #e8ddd0;
    }

    /* ── KEN BURNS ──
       Same animation on both layers so they stay perfectly in sync
       during the cross-dissolve — looks like one continuous camera move. */
    @keyframes kb {
      from { transform: scale(1.00) translate(0%,    0%);    }
      to   { transform: scale(1.07) translate(-0.9%, -0.5%); }
    }

    /* ── SCENES ── */
    .scene {
      position: fixed;
      inset: 0;
      background-size: cover;
      background-position: center top;
      animation: kb 24s ease-in-out infinite alternate;
    }

    #s-empty { z-index: 1; }
    #s-woman { z-index: 2; opacity: 0; }

    /* ── OVERLAYS ── */
    .grad-top {
      position: fixed;
      top: 0; left: 0; right: 0; height: 26%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.22), transparent);
      z-index: 10; pointer-events: none;
    }
    .grad-bot {
      position: fixed;
      bottom: 0; left: 0; right: 0; height: 40%;
      background: linear-gradient(to top, rgba(0,0,0,0.42), transparent);
      z-index: 10; pointer-events: none;
    }
    .vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 90% 80% at 50% 44%,
                    transparent 30%, rgba(0,0,0,0.36) 100%);
      z-index: 11; pointer-events: none;
    }

    /* ── LOGO (left-center, no text around it) ── */
    .brand {
      position: fixed;
      left: 52px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      pointer-events: none;
    }

    /* Float animation runs on the wrapper so it doesn't conflict
       with the img's appear transition */
    @keyframes logo-float {
      0%, 100% { transform: translateY(-50%);             }
      50%       { transform: translateY(calc(-50% - 9px)); }
    }
    .brand.floating {
      animation: logo-float 5.5s ease-in-out infinite;
    }

    .brand__logo {
      display: block;
      height: clamp(72px, 10vw, 110px);
      width: auto;
      opacity: 0;
      transform: translateX(-18px);
      /* Natural colours work well on the warm beige background;
         drop-shadow gives just enough separation */
      filter: drop-shadow(0 3px 18px rgba(0,0,0,0.22));
      transition:
        opacity   2s   cubic-bezier(0.16, 1, 0.3, 1),
        transform 2.2s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .brand__logo.visible {
      opacity: 1;
      transform: translateX(0);
    }

    /* ── FILM GRAIN ── */
    svg.grain {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 49; pointer-events: none;
      mix-blend-mode: overlay;
      animation: grain-shift 0.42s steps(2) infinite;
    }
    @keyframes grain-shift {
      0%   { transform: translate(0px,   0px)  scale(1.01); }
      50%  { transform: translate(-4px, -6px)  scale(1.00); }
      100% { transform: translate( 6px,  3px)  scale(1.02); }
    }
  </style>
</head>
<body>

  <div class="scene" id="s-empty"
       style="background-image: url('images/scene-empty.jpg')"></div>
  <div class="scene" id="s-woman"
       style="background-image: url('images/scene-woman.jpg')"></div>

  <div class="grad-top"></div>
  <div class="grad-bot"></div>
  <div class="vignette"></div>

  <!-- Logo: left-center, PNG with transparent background, no text around -->
  <div class="brand" id="brand">
    <img class="brand__logo" id="brandLogo"
         src="images/logo.png" alt="BBELA LINS">
  </div>

  <!-- Film grain -->
  <svg class="grain" xmlns="http://www.w3.org/2000/svg">
    <filter id="gf" x="0%" y="0%" width="100%" height="100%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.76"
                    numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#gf)" opacity="0.045"/>
  </svg>

  <script>
    const woman     = document.getElementById('s-woman');
    const brand     = document.getElementById('brand');
    const brandLogo = document.getElementById('brandLogo');

    window.addEventListener('load', () => {

      // Logo slides in from the left shortly after load
      setTimeout(() => brandLogo.classList.add('visible'), 350);

      // After the appear transition settles, start the float loop
      setTimeout(() => brand.classList.add('floating'), 2700);

      // Woman dissolves in — faster than before (800 ms delay, 2.5 s fade)
      setTimeout(() => {
        woman.style.transition = 'opacity 2.5s ease';
        woman.style.opacity    = '1';
      }, 800);

    });
  </script>

</body>
</html>
