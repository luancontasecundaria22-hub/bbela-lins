<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBELA LINS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --terracotta: #c4896a;
      --cream: #f5efe8;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: #0d0b09;
      font-family: 'Montserrat', sans-serif;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 30px 52px;
      display: flex;
      align-items: center;
      gap: 14px;
      pointer-events: none;
    }

    .nav__brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      letter-spacing: 0.48em;
      color: var(--cream);
      font-weight: 300;
      opacity: 0;
      transition: opacity 1.4s ease;
    }

    .nav__brand.show { opacity: 0.9; }

    /* ── SCROLL TRACK ── */
    .scroll-track { height: 1050vh; }

    /* ── STAGE (fixed viewport) ── */
    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #0d0b09;
    }

    /* ── SCENES ── */
    .scene {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: top center;
      opacity: 0;
      will-change: opacity, transform;
    }

    /* Ken Burns — each scene moves in a different direction */
    @keyframes kb0 { from { transform: scale(1.0)  translate(0%,    0%);   } to { transform: scale(1.07) translate(-1.2%, -0.6%); } }
    @keyframes kb1 { from { transform: scale(1.05) translate(-1.5%, 0%);   } to { transform: scale(1.0)  translate( 1.5%, 0.5%);  } }
    @keyframes kb2 { from { transform: scale(1.0)  translate( 0.5%, 0%);   } to { transform: scale(1.06) translate(-0.5%, -1.0%); } }
    @keyframes kb3 { from { transform: scale(1.06) translate( 1.0%, -0.5%);} to { transform: scale(1.0)  translate(-1.0%, 0.5%);  } }
    @keyframes kb4 { from { transform: scale(1.0)  translate(-0.5%, 0%);   } to { transform: scale(1.08) translate( 0.5%, -1.0%); } }
    @keyframes kb5 { from { transform: scale(1.04) translate( 0%,  -0.5%); } to { transform: scale(1.0)  translate( 0%,   0.5%);  } }
    @keyframes kb6 { from { transform: scale(1.0)  translate( 0%,   0%);   } to { transform: scale(1.06) translate(-0.8%, -0.8%); } }

    #s0 { animation: kb0 15s ease-in-out infinite alternate; }
    #s1 { animation: kb1 13s ease-in-out infinite alternate; }
    #s2 { animation: kb2 17s ease-in-out infinite alternate; }
    #s3 { animation: kb3 14s ease-in-out infinite alternate; }
    #s4 { animation: kb4 16s ease-in-out infinite alternate; }
    #s5 { animation: kb5 12s ease-in-out infinite alternate; }
    #s6 { animation: kb6 18s ease-in-out infinite alternate; }

    .woman-layer {
      position: absolute;
      inset: 0;
      background-image: url('images/hero.png.png');
      background-size: cover;
      background-position: top center;
      opacity: 0;
      will-change: opacity;
      pointer-events: none;
      animation: kb0 20s ease-in-out infinite alternate;
    }

    /* ── GRADIENT OVERLAYS ── */
    .grad-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 28%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.45), transparent);
      pointer-events: none;
      z-index: 10;
    }

    .grad-bot {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
      pointer-events: none;
      z-index: 10;
    }

    /* ── BRAND ── */
    .brand {
      position: absolute;
      bottom: 68px;
      left: 56px;
      z-index: 20;
      pointer-events: none;
    }

    .brand__title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 5.5vw, 5.2rem);
      letter-spacing: 0.2em;
      color: var(--cream);
      font-weight: 300;
      line-height: 1;
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 1.8s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 1.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .brand__sub {
      margin-top: 16px;
      font-size: 0.6rem;
      letter-spacing: 0.6em;
      color: var(--terracotta);
      font-weight: 200;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s,
                  transform 2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s;
    }

    .brand.show .brand__title,
    .brand.show .brand__sub {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── PROGRESS DOTS ── */
    .progress {
      position: fixed;
      right: 34px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      cursor: pointer;
      transition: background 0.5s ease, transform 0.5s ease;
    }

    .dot.active {
      background: var(--terracotta);
      transform: scale(1.7);
    }

    /* ── SCROLL CUE ── */
    .scroll-cue {
      position: absolute;
      bottom: 34px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
    }

    .scroll-cue.show { opacity: 0.55; }

    .scroll-cue__label {
      font-size: 0.55rem;
      letter-spacing: 0.55em;
      color: white;
      text-transform: uppercase;
    }

    .scroll-cue__track {
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.18);
      position: relative;
      overflow: hidden;
    }

    .scroll-cue__track::after {
      content: '';
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.8);
      animation: drip 2.2s ease-in-out infinite;
    }

    @keyframes drip {
      0%   { top: -100%; opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <span class="nav__brand" id="navBrand">BBELA LINS</span>
  </nav>

  <div class="scroll-track"></div>

  <div class="stage">

    <div class="scene" id="s0" style="background-image: url('images/hero.png.png')"></div>
    <div class="scene" id="s1" style="background-image: url('images/beach1.png.png')"></div>
    <div class="scene" id="s2" style="background-image: url('images/beach2.png.png')"></div>
    <div class="scene" id="s3" style="background-image: url('images/beach3.png.png')"></div>
    <div class="scene" id="s4" style="background-image: url('images/beach4.png.png')"></div>
    <div class="scene" id="s5" style="background-image: url('images/beach5.png.png')"></div>
    <div class="scene" id="s6" style="background-image: url('images/beach6.png.png')"></div>

    <div class="woman-layer" id="womanLayer"></div>

    <div class="grad-top"></div>
    <div class="grad-bot"></div>

    <div class="brand" id="brand">
      <h1 class="brand__title">BBELA LINS</h1>
      <p class="brand__sub">siga os passos</p>
    </div>

    <div class="scroll-cue" id="scrollCue">
      <span class="scroll-cue__label">scroll</span>
      <div class="scroll-cue__track"></div>
    </div>

    <div class="progress" id="progressDots"></div>

  </div>

  <script>
    const SCENE_COUNT = 7;
    const VH = () => window.innerHeight;
    const SCROLL_PER_SCENE = () => VH() * 1.5;

    const scenes     = Array.from({ length: SCENE_COUNT }, (_, i) => document.getElementById(`s${i}`));
    const womanLayer = document.getElementById('womanLayer');
    const brand      = document.getElementById('brand');
    const navBrand   = document.getElementById('navBrand');
    const scrollCue  = document.getElementById('scrollCue');
    const dotsEl     = document.getElementById('progressDots');

    const dots = scenes.map((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.addEventListener('click', () => {
        window.scrollTo({ top: i * SCROLL_PER_SCENE(), behavior: 'smooth' });
      });
      dotsEl.appendChild(d);
      return d;
    });

    const clamp      = (v, lo, hi) => Math.min(Math.max(v, lo), hi);
    const smoothstep = t => t * t * (3 - 2 * t);
    const fade       = (t, a, b) => smoothstep(clamp((t - a) / (b - a), 0, 1));

    function render() {
      const scrollY = window.scrollY;
      const sps     = SCROLL_PER_SCENE();
      const pos     = scrollY / sps;
      const OVERLAP = 0.28;

      scenes.forEach((scene, i) => {
        const enter = i - OVERLAP;
        const exit  = i + 1 - OVERLAP;

        let op = 0;
        if      (pos < enter)  op = 0;
        else if (pos < i)      op = fade(pos, enter, i);
        else if (pos < exit)   op = 1;
        else if (pos < i + 1)  op = 1 - fade(pos, exit, i + 1);
        else                   op = 0;

        scene.style.opacity = op;
      });

      const womanOp = pos < 0.05
        ? fade(pos, 0, 0.05)
        : 1 - fade(pos, 0.15, 0.55);
      womanLayer.style.opacity = clamp(womanOp, 0, 1);

      brand.style.opacity = clamp(1 - fade(pos, 0.4, 1.0), 0, 1);
      scrollCue.style.opacity = clamp((1 - fade(pos, 0, 0.3)) * 0.55, 0, 0.55);

      const active = Math.min(Math.round(pos), SCENE_COUNT - 1);
      dots.forEach((d, i) => d.classList.toggle('active', i === active));
    }

    let ticking = false;
    window.addEventListener('scroll', () => {
      if (!ticking) {
        requestAnimationFrame(() => { render(); ticking = false; });
        ticking = true;
      }
    }, { passive: true });

    window.addEventListener('load', () => {
      scenes[0].style.opacity = 1;
      womanLayer.style.opacity = 1;
      render();

      setTimeout(() => {
        navBrand.classList.add('show');
        brand.classList.add('show');
      }, 400);

      setTimeout(() => scrollCue.classList.add('show'), 2200);
    });
  </script>

</body>
</html>
