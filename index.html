<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BBELA LINS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --terracotta: #c4896a;
      --cream: #f5efe8;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      background: #0d0b09;
      font-family: 'Montserrat', sans-serif;
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 28px 48px;
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .nav__logo {
      height: 38px;
      width: auto;
      opacity: 0;
      transition: opacity 1.6s ease;
      filter: brightness(2.2) saturate(0.85);
    }

    .nav__logo.show { opacity: 0.88; }

    /* ── SCROLL TRACK ── */
    .scroll-track { height: 1050vh; }

    /* ── STAGE ── */
    .stage {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #0d0b09;
    }

    /* ── SCENES ── */
    .scene {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: top center;
      opacity: 0;
      will-change: opacity, transform;
    }

    /* Ken Burns — varied pace, each scene drifts differently */
    @keyframes kb0 { from { transform: scale(1.00) translate(  0%,    0%); } to { transform: scale(1.09) translate(-1.6%, -0.9%); } }
    @keyframes kb1 { from { transform: scale(1.07) translate(-2.0%,  0%); } to { transform: scale(1.00) translate( 2.0%,  0.7%); } }
    @keyframes kb2 { from { transform: scale(1.00) translate( 0.7%,  0%); } to { transform: scale(1.08) translate(-0.9%, -1.4%); } }
    @keyframes kb3 { from { transform: scale(1.08) translate( 1.3%, -0.7%); } to { transform: scale(1.00) translate(-1.3%,  0.7%); } }
    @keyframes kb4 { from { transform: scale(1.00) translate(-0.7%,  0%); } to { transform: scale(1.10) translate( 0.7%, -1.3%); } }
    @keyframes kb5 { from { transform: scale(1.06) translate( 0%,  -0.7%); } to { transform: scale(1.00) translate( 0%,   0.7%); } }
    @keyframes kb6 { from { transform: scale(1.00) translate( 0%,    0%); } to { transform: scale(1.08) translate(-1.1%, -1.1%); } }

    #s0 { animation: kb0 20s ease-in-out infinite alternate; }
    #s1 { animation: kb1 17s ease-in-out infinite alternate; }
    #s2 { animation: kb2 22s ease-in-out infinite alternate; }
    #s3 { animation: kb3 18s ease-in-out infinite alternate; }
    #s4 { animation: kb4 21s ease-in-out infinite alternate; }
    #s5 { animation: kb5 16s ease-in-out infinite alternate; }
    #s6 { animation: kb6 24s ease-in-out infinite alternate; }

    .woman-layer {
      position: absolute;
      inset: 0;
      background-image: url('images/hero.png.png');
      background-size: cover;
      background-position: top center;
      opacity: 0;
      will-change: opacity;
      pointer-events: none;
      animation: kb0 26s ease-in-out infinite alternate;
    }

    /* ── OVERLAYS ── */
    .grad-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 32%;
      background: linear-gradient(to bottom, rgba(0,0,0,0.52), transparent);
      pointer-events: none;
      z-index: 10;
    }

    .grad-bot {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(to top, rgba(0,0,0,0.72), transparent);
      pointer-events: none;
      z-index: 10;
    }

    .vignette {
      position: absolute;
      inset: 0;
      z-index: 11;
      pointer-events: none;
      background: radial-gradient(ellipse 90% 80% at 50% 42%, transparent 30%, rgba(0,0,0,0.52) 100%);
    }

    /* ── BRAND ── */
    .brand {
      position: absolute;
      bottom: 72px;
      left: 56px;
      z-index: 20;
      pointer-events: none;
    }

    .brand__logo {
      height: clamp(60px, 9vw, 100px);
      width: auto;
      display: block;
      opacity: 0;
      transform: translateY(26px);
      filter: brightness(2.2) saturate(0.85) drop-shadow(0 4px 24px rgba(0,0,0,0.55));
      transition:
        opacity  2.0s cubic-bezier(0.16, 1, 0.3, 1),
        transform 2.2s cubic-bezier(0.16, 1, 0.3, 1),
        filter   2.0s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .brand__sub {
      margin-top: 16px;
      font-size: 0.58rem;
      letter-spacing: 0.64em;
      color: var(--terracotta);
      font-weight: 200;
      text-transform: uppercase;
      opacity: 0;
      transform: translateY(18px);
      transition:
        opacity  2.2s cubic-bezier(0.16, 1, 0.3, 1) 0.45s,
        transform 2.4s cubic-bezier(0.16, 1, 0.3, 1) 0.45s;
    }

    .brand.show .brand__logo {
      opacity: 1;
      transform: translateY(0);
    }

    .brand.show .brand__sub {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── PROGRESS DOTS ── */
    .progress {
      position: fixed;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      cursor: pointer;
      transition: background 0.55s ease, transform 0.55s ease;
      margin: 7px 0;
    }

    .dot.active {
      background: var(--terracotta);
      transform: scale(2.1);
    }

    .dot-line {
      width: 1px;
      height: 0;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.12), transparent);
      display: none;
    }

    /* ── SCROLL CUE ── */
    .scroll-cue {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.4s ease;
    }

    .scroll-cue.show { opacity: 0.48; }

    .scroll-cue__label {
      font-size: 0.5rem;
      letter-spacing: 0.6em;
      color: var(--cream);
      text-transform: uppercase;
    }

    .scroll-cue__track {
      width: 1px;
      height: 52px;
      background: rgba(255,255,255,0.14);
      position: relative;
      overflow: hidden;
    }

    .scroll-cue__track::after {
      content: '';
      position: absolute;
      top: -100%;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.9), transparent);
      animation: drip 2.6s ease-in-out infinite;
    }

    @keyframes drip {
      0%   { top: -100%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* ── FILM GRAIN ── */
    svg.grain {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 49;
      pointer-events: none;
      mix-blend-mode: overlay;
      animation: grain-shift 0.45s steps(2) infinite;
    }

    @keyframes grain-shift {
      0%   { transform: translate(0px,  0px) scale(1.01); }
      50%  { transform: translate(-5px, -7px) scale(1.0);  }
      100% { transform: translate(7px,  4px) scale(1.02); }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <img class="nav__logo" id="navLogo" src="images/logo-mark.png" alt="BBELA LINS">
  </nav>

  <div class="scroll-track"></div>

  <div class="stage">

    <div class="scene" id="s0" style="background-image: url('images/hero.png.png')"></div>
    <div class="scene" id="s1" style="background-image: url('images/beach1.png.png')"></div>
    <div class="scene" id="s2" style="background-image: url('images/beach2.png.png')"></div>
    <div class="scene" id="s3" style="background-image: url('images/beach3.png.png')"></div>
    <div class="scene" id="s4" style="background-image: url('images/beach4.png.png')"></div>
    <div class="scene" id="s5" style="background-image: url('images/beach5.png.png')"></div>
    <div class="scene" id="s6" style="background-image: url('images/beach6.png.png')"></div>

    <div class="woman-layer" id="womanLayer"></div>

    <div class="grad-top"></div>
    <div class="grad-bot"></div>
    <div class="vignette"></div>

    <div class="brand" id="brand">
      <img class="brand__logo" src="images/logo.png" alt="BBELA LINS">
      <p class="brand__sub">siga os passos</p>
    </div>

    <div class="scroll-cue" id="scrollCue">
      <span class="scroll-cue__label">scroll</span>
      <div class="scroll-cue__track"></div>
    </div>

    <div class="progress" id="progressDots"></div>

  </div>

  <!-- Film grain overlay -->
  <svg class="grain" xmlns="http://www.w3.org/2000/svg">
    <filter id="grain-filter" x="0%" y="0%" width="100%" height="100%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="4"
                    stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
    <rect width="100%" height="100%" filter="url(#grain-filter)" opacity="0.055"/>
  </svg>

  <script>
    const SCENE_COUNT  = 7;
    const VH           = () => window.innerHeight;
    const SCROLL_PER_SCENE = () => VH() * 1.5;

    const scenes    = Array.from({ length: SCENE_COUNT }, (_, i) => document.getElementById(`s${i}`));
    const womanLayer = document.getElementById('womanLayer');
    const brand      = document.getElementById('brand');
    const navLogo    = document.getElementById('navLogo');
    const scrollCue  = document.getElementById('scrollCue');
    const dotsEl     = document.getElementById('progressDots');

    // Build progress dots
    const dots = scenes.map((_, i) => {
      const d = document.createElement('div');
      d.className = 'dot';
      d.title = `Cena ${i + 1}`;
      d.addEventListener('click', () => {
        window.scrollTo({ top: i * SCROLL_PER_SCENE(), behavior: 'smooth' });
      });
      dotsEl.appendChild(d);
      return d;
    });

    // ── Easing helpers ──────────────────────────────────────────────────────
    const clamp       = (v, lo, hi) => Math.min(Math.max(v, lo), hi);
    // Smootherstep (Perlin's C² version) — softer than standard smoothstep
    const smoothstep  = t => t * t * t * (t * (t * 6 - 15) + 10);
    const fade        = (t, a, b) => smoothstep(clamp((t - a) / (b - a), 0, 1));

    // ── Lerped scroll ───────────────────────────────────────────────────────
    // The rendering tracks a smoothly interpolated scroll position so all
    // cross-fades feel silky even during fast scrolling.
    let targetScroll = 0;
    let smoothScroll = 0;
    const LERP_FACTOR = 0.072;

    function renderFrame(scrollY) {
      const sps     = SCROLL_PER_SCENE();
      const pos     = scrollY / sps;
      const OVERLAP = 0.40; // longer overlap → more cinematic cross-dissolve

      scenes.forEach((scene, i) => {
        const enter = i - OVERLAP;
        const exit  = i + 1 - OVERLAP;

        let op = 0;
        if      (pos < enter) op = 0;
        else if (pos < i)     op = fade(pos, enter, i);
        else if (pos < exit)  op = 1;
        else if (pos < i + 1) op = 1 - fade(pos, exit, i + 1);
        else                  op = 0;

        scene.style.opacity = op;
      });

      // Hero overlay: appears immediately, dissolves by the second scene
      const womanOp = pos < 0.04
        ? fade(pos, 0, 0.04)
        : 1 - fade(pos, 0.12, 0.58);
      womanLayer.style.opacity = clamp(womanOp, 0, 1);

      // Brand logo: stays longer, exits gracefully
      brand.style.opacity = clamp(1 - fade(pos, 0.48, 1.15), 0, 1);

      // Scroll cue
      scrollCue.style.opacity = clamp((1 - fade(pos, 0, 0.32)) * 0.48, 0, 0.48);

      // Active dot
      const active = Math.min(Math.round(pos), SCENE_COUNT - 1);
      dots.forEach((d, i) => d.classList.toggle('active', i === active));
    }

    function tick() {
      // Exponential approach — feels like inertia without overshoot
      smoothScroll += (targetScroll - smoothScroll) * LERP_FACTOR;
      renderFrame(smoothScroll);
      requestAnimationFrame(tick);
    }

    window.addEventListener('scroll', () => {
      targetScroll = window.scrollY;
    }, { passive: true });

    window.addEventListener('load', () => {
      targetScroll = window.scrollY;
      smoothScroll = window.scrollY;

      // Kick off the perpetual render loop
      requestAnimationFrame(tick);

      // Initial state
      scenes[0].style.opacity  = 1;
      womanLayer.style.opacity = 1;

      // Staggered reveals
      setTimeout(() => {
        navLogo.classList.add('show');
        brand.classList.add('show');
      }, 480);

      setTimeout(() => scrollCue.classList.add('show'), 2600);
    });
  </script>

</body>
</html>
